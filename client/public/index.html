<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <!-- <link rel="icon" href="%PUBLIC_URL%/favicon.ico" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Shop-IT 🛍️ | A ecommerce website" />
    <title>Shop-IT 🛍️</title>
    
    <!-- Urbanist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- Override all other fonts with Urbanist -->
    <style>
      * {
        font-family: "Urbanist", sans-serif !important;
      }
      /* Global pre-React loader */
      .loader {
        position: relative;
        display: inline-block;
        transform: rotateZ(45deg);
        perspective: 1000px;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        color: #000;
      }
      .loader:before,
      .loader:after {
        content: '';
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: inherit;
        height: inherit;
        border-radius: 50%;
        transform: rotateX(70deg);
        animation: 1s spin linear infinite;
      }
      .loader:after {
        color: #FF3D00;
        transform: rotateY(70deg);
        animation-delay: .4s;
      }
      @keyframes spin {
        0%, 100% { box-shadow: .2em 0px 0 0px currentcolor; }
        12% { box-shadow: .2em .2em 0 0 currentcolor; }
        25% { box-shadow: 0 .2em 0 0px currentcolor; }
        37% { box-shadow: -.2em .2em 0 0 currentcolor; }
        50% { box-shadow: -.2em 0 0 0 currentcolor; }
        62% { box-shadow: -.2em -.2em 0 0 currentcolor; }
        75% { box-shadow: 0px -.2em 0 0 currentcolor; }
        87% { box-shadow: .2em -.2em 0 0 currentcolor; }
      }
      .initial-loader-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #fff;
      }
    </style>

    <link rel="stylesheet" type="text/css" href="%PUBLIC_URL%/style.css">
</head>

<body id="page-top">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="font-light text-base text-gray-800 bg-white flex flex-col min-h-screen" id="root">
      <div class="initial-loader-wrap">
        <span class="loader"></span>
      </div>
    </div>
</body>

</html>
